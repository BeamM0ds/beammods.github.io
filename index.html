<!DOCTYPE html>
<html lang="en">
<head>
    <meta name="description" content="Download premium, high-quality BeamNG.drive mods. Cars, trucks, maps, and parts updated daily.">
<meta name="keywords" content="BeamNG mods, BeamNG.drive, car mods, BeamNG trucks, free beamng mods">
<meta name="author" content="Royal Renderings">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BeamMods | Premium BeamNG Mods</title>
    <meta name="google-site-verification" content="c81wDWuOBx9-7Ca7kV4672lI50Vt_GerR7jA64zwGNk" />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #0b0e14;
            --card-bg: #161b22;
            --border: #30363d;
            --accent: #3498db;
            --text-dim: #8b949e;
        }

        body { background-color: var(--bg); color: white; margin: 0; font-family: 'Inter', sans-serif; -webkit-font-smoothing: antialiased; }

        /* HEADER */
        .header { 
            background: var(--bg); border-bottom: 1px solid var(--border); padding: 12px 24px; 
            display: flex; justify-content: space-between; align-items: center; 
            position: sticky; top: 0; z-index: 1000;
        }
        .header-left, .header-right { display: flex; align-items: center; gap: 15px; }

        /* BUTTONS */
        .btn-action {
            background: var(--card-bg); border: 1px solid var(--border); width: 40px; height: 40px;
            border-radius: 8px; cursor: pointer; display: flex; align-items: center; justify-content: center;
            color: white; transition: 0.2s; text-decoration: none; font-size: 18px;
        }
        .btn-action:hover { background: var(--border); border-color: var(--accent); color: var(--accent); }
        
        .discord-btn { background: #5865f2; border: none; }
        .discord-btn:hover { background: #4752c4; transform: translateY(-1px); color: white; }

        .logo { font-weight: 800; letter-spacing: 4px; font-size: 20px; text-transform: uppercase; cursor: pointer; }
        .logo span { color: var(--accent); }

        .search-container { background: #11141a; border: 1px solid var(--border); border-radius: 6px; padding: 0 12px; display: flex; align-items: center; }
        .search-container input { background: transparent; border: none; color: white; padding: 8px 0; width: 180px; outline: none; font-size: 13px; }

        /* LAYOUT */
        .main-layout { display: flex; padding: 25px; gap: 30px; min-height: 90vh; }
        
        .sidebar { width: 240px; flex-shrink: 0; transition: 0.3s ease; }
        .sidebar.hidden { width: 0; opacity: 0; pointer-events: none; margin-right: -30px; transform: translateX(-20px); }

        .sidebar-title { color: #444; font-size: 11px; font-weight: 800; margin: 20px 0 10px 10px; text-transform: uppercase; letter-spacing: 1.5px; }
        .sidebar-link { 
            display: flex; align-items: center; color: var(--text-dim); text-decoration: none; 
            padding: 10px 14px; border-radius: 8px; margin-bottom: 4px; transition: 0.2s; font-weight: 600; font-size: 14px; 
        }
        .sidebar-link:hover { color: white; background: var(--card-bg); }
        .sidebar-link.active { background: var(--card-bg); color: white; border-left: 3px solid var(--accent); }
        .sidebar-link span { margin-right: 12px; font-size: 16px; }

        /* MOD GRID */
        .mods { display: grid; grid-template-columns: repeat(auto-fill, minmax(300px, 1fr)); gap: 25px; width: 100%; align-content: start; }
        .mod-card { background: var(--card-bg); border-radius: 12px; overflow: hidden; border: 1px solid var(--border); transition: 0.3s; cursor: pointer; }
        .mod-card:hover { border-color: var(--accent); transform: translateY(-4px); }
        
        #status-msg { grid-column: 1 / -1; text-align: center; padding: 40px; color: var(--text-dim); font-size: 16px; }
    </style>
</head>
<body>

    <header class="header">
    <div class="header-left">
        <button class="btn-action" onclick="toggleSidebar()">...</button>
        <div class="logo">BEAM<span>MODS</span></div>
    </div>

    <div class="header-right">
        <a href="https://discord.gg/whUdZ2gTTe" class="discord-btn">
            <i class="fab fa-discord"></i>
        </a>
        
        <div class="search-wrapper">
            <input type="text" id="search" placeholder="Search mods..." onkeyup="searchMods()">
        </div>
    </div>
</header>

    <main class="main-layout">
        <aside class="sidebar" id="sidebar-menu">
            <div class="sidebar-title">Main</div>
            <a href="javascript:void(0)" class="sidebar-link active" onclick="filterSelection('all', this)"><span>🏠</span> All Mods</a>
            
            <div class="sidebar-title">Vehicles</div>
            <a href="javascript:void(0)" class="sidebar-link" onclick="filterSelection('cars', this)"><span>🏎️</span> Cars</a>
            <a href="javascript:void(0)" class="sidebar-link" onclick="filterSelection('trucks', this)"><span>🚛</span> Trucks</a>
            
            <div class="sidebar-title">Customization</div>
            <a href="javascript:void(0)" class="sidebar-link" onclick="filterSelection('parts', this)"><span>🔧</span> Vehicle Parts</a>
            <a href="javascript:void(0)" class="sidebar-link" onclick="filterSelection('skins', this)"><span>🎨</span> Skins & Liveries</a>
            <a href="javascript:void(0)" class="sidebar-link" onclick="filterSelection('engine sounds', this)"><span>🔊</span> Engine Sounds</a>

            <div class="sidebar-title">World</div>
            <a href="javascript:void(0)" class="sidebar-link" onclick="filterSelection('maps', this)"><span>🗺️</span> Maps</a>
        </aside>

        <section class="mods" id="mods">
            <div id="status-msg">Loading premium mods...</div>
        </section>
    </main>

    <script src="script.js"></script>
</body>
</html>
