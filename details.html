<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mod Details | BeamMods</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap" rel="stylesheet">
    <style>
        body { background-color: #0b0e14; color: white; font-family: 'Inter', sans-serif; margin: 0; }
        .header { background: #0b0e14; border-bottom: 1px solid #1c2128; padding: 18px 40px; }
        .logo { font-weight: 800; letter-spacing: 4px; font-size: 22px; text-transform: uppercase; color: white; cursor: pointer; }
        .logo span { color: #3498db; }
        .details-layout { max-width: 1100px; margin: 40px auto; display: grid; grid-template-columns: 1fr 350px; gap: 40px; padding: 0 20px; }
        .hero-img { width: 100%; border-radius: 12px; border: 1px solid #1c2128; }
        .description-box { background: #161b22; padding: 25px; border-radius: 12px; border: 1px solid #1c2128; margin-top: 20px; color: #b1b8c0; }
        .sidebar-card { background: #161b22; padding: 25px; border-radius: 15px; border: 1px solid #1c2128; height: fit-content; }
        .dl-button { display: block; background: #3498db; color: white; text-align: center; padding: 16px; border-radius: 10px; text-decoration: none; font-weight: 700; margin-bottom: 20px; }
        .info-row { display: flex; justify-content: space-between; padding: 12px 0; border-bottom: 1px solid #21262d; font-size: 14px; color: #8b949e; }
        .info-row span { color: white; font-weight: 600; }
    </style>
</head>
<body>
    <header class="header"><div class="logo" onclick="window.location.href='index.html'">BEAM<span>MODS</span></div></header>
    <main class="details-layout" id="details-content"></main>
    <script>
        async function loadDetails() {
            const params = new URLSearchParams(window.location.search);
            const id = params.get('id');
            const response = await fetch('mods.json?t=' + Date.now());
            const mods = await response.json();
            const mod = mods[id];
            document.getElementById('details-content').innerHTML = `
                <div>
                    <img src="${mod.image}" class="hero-img">
                    <h1 style="font-weight:800; margin:25px 0 5px;">${mod.name}</h1>
                    <p style="color:#555; margin-bottom:20px;">by <span style="color:#3498db;">${mod.author || 'Royal Renderings'}</span></p>
                    <div class="description-box">${mod.description}</div>
                </div>
                <aside class="sidebar-card">
                    <a href="${mod.download}" class="dl-button">Download Now</a>
                    <div class="info-row">Category <span>${mod.category}</span></div>
                    <div class="info-row">Author <span>${mod.author || 'Royal Renderings'}</span></div>
                    <div class="info-row">Version <span>1.4</span></div>
                    <div class="info-row">Status <span>${mod.tag || 'NEW'}</span></div>
                </aside>`;
        }
        window.onload = loadDetails;
    </script>
</body>
</html>
