<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mod Details | BeamMods</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
    <style>
        body { background-color: #0b0e14; color: white; font-family: 'Inter', sans-serif; margin: 0; }
        .header { background: #0b0e14; border-bottom: 1px solid #1c2128; padding: 15px 50px; }
        
        .details-layout { 
            max-width: 1200px; 
            margin: 40px auto; 
            display: grid; 
            grid-template-columns: 1fr 350px; 
            gap: 40px; 
            padding: 0 20px; 
        }

        /* Main Content Styling */
        .hero-img { width: 100%; border-radius: 12px; border: 1px solid #1c2128; box-shadow: 0 10px 30px rgba(0,0,0,0.5); }
        .mod-title { font-size: 32px; margin: 25px 0 5px 0; font-weight: 700; }
        .author-line { color: #555; font-size: 14px; margin-bottom: 25px; }
        .author-line span { color: #3498db; font-weight: 600; }
        
        .description-container { 
            background: #161b22; 
            padding: 25px; 
            border-radius: 12px; 
            line-height: 1.8; 
            color: #b1b8c0;
            border: 1px solid #1c2128;
        }

        /* Sidebar Styling */
        .sidebar-card { 
            background: #161b22; 
            padding: 25px; 
            border-radius: 15px; 
            border: 1px solid #1c2128; 
            height: fit-content;
            position: sticky;
            top: 20px;
        }

        .dl-button { 
            display: flex; 
            align-items: center; 
            justify-content: center;
            background: #3498db; 
            color: white; 
            text-align: center; 
            padding: 16px; 
            border-radius: 10px; 
            text-decoration: none; 
            font-weight: 700; 
            font-size: 18px; 
            margin-bottom: 20px; 
            transition: 0.2s ease;
        }
        .dl-button:hover { background: #2980b9; transform: translateY(-2px); }

        .info-row { 
            display: flex; 
            justify-content: space-between; 
            padding: 14px 0; 
            border-bottom: 1px solid #21262d; 
            font-size: 14px; 
            color: #8b949e; 
        }
        .info-row:last-child { border-bottom: none; }
        .info-row span { color: #ffffff; font-weight: 600; }

        @media (max-width: 900px) {
            .details-layout { grid-template-columns: 1fr; }
            .sidebar-card { position: static; }
        }
    </style>
</head>
<body>

    <header class="header">
        <div class="logo" onclick="window.location.href='index.html'" style="cursor:pointer">BEAM<span>MODS</span></div>
    </header>

    <main class="details-layout" id="details-content">
        <div style="padding: 50px; text-align: center; color: #555;">Loading Mod Details...</div>
    </main>

    <script>
        async function loadDetails() {
            try {
                // 1. Get the Mod ID from the URL (e.g., details.html?id=0)
                const params = new URLSearchParams(window.location.search);
                const id = params.get('id');

                // 2. Fetch the mods.json file
                const response = await fetch('mods.json');
                const mods = await response.json();
                const mod = mods[id];

                if (!mod) {
                    document.getElementById('details-content').innerHTML = "<h1 style='text-align:center; grid-column: 1 / -1;'>Mod Not Found</h1>";
                    return;
                }

                // 3. Inject the mod data into the page
                document.getElementById('details-content').innerHTML = `
                    <div class="main-content">
                        <img src="${mod.image}" alt="${mod.name}" class="hero-img">
                        <h1 class="mod-title">${mod.name}</h1>
                        <p class="author-line">by <span>${mod.author || mod.Author || 'Royal Renderings'}</span> • IRL Vehicle</p>
                        
                        <div class="description-container">
                            ${mod.description}
                        </div>
                    </div>

                    <aside class="sidebar-card">
                        <a href="${mod.download}" target="_blank" class="dl-button">
                            <span style="margin-right:10px;">⬇</span> Download Now
                        </a>
                        
                        <div class="info-row">Category <span>${mod.category}</span></div>
                        <div class="info-row">Status <span>${mod.tag || 'Stable'}</span></div>
                        <div class="info-row">Version <span>${mod.version || '1.0'}</span></div>
                        <div class="info-row">File Size <span>${mod.size || 'Unknown'}</span></div>
                    </aside>
                `;

                // Update page title to mod name
                document.title = mod.name + " | BeamMods";

            } catch (error) {
                console.error("Error:", error);
                document.getElementById('details-content').innerHTML = "<h1>Error loading mod data.</h1>";
            }
        }

        window.onload = loadDetails;
    </script>
</body>
</html>
